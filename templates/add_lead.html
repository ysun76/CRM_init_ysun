{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Neuen Lead hinzufügen</h1>
    <hr>
    
    <div class="row">
        <div class="col-md-6">
            <form method="POST" action="{{ url_for('add_lead') }}">
                <div class="mb-3">
                    <label for="name" class="form-label">Vollständiger Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">E-Mail Adresse</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="company" class="form-label">Unternehmen</label>
                    <input type="text" class="form-control" id="company" name="company" required>
                </div>
                <div class="mb-3">
                    <label for="value" class="form-label">Erwarteter Wert (€)</label>
                    <input type="number" step="0.01" class="form-control" id="value" name="value" required>
                </div>
                <div class="mb-3">
                    <label for="source" class="form-label">Quelle (z.B. Website, Messe)</label>
                    <input type="text" class="form-control" id="source" name="source">
                </div>
                
                <button type="submit" class="btn btn-primary">Speichern</button>
                <a href="{{ url_for('leads') }}" class="btn btn-secondary">Abbrechen</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
