{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px;">
    <h2>CRM System Login</h2>
    <p><i>Sprint 2 Implementierung (CIY-16)</i></p>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div style="color: {% if category == 'error' %}red{% else %}green{% endif %}; margin-bottom: 10px;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Benutzername:</label><br>
            <input type="text" name="username" required style="width: 100%;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Passwort:</label><br>
            <input type="password" name="password" required style="width: 100%;">
        </div>
        <button type="submit" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Anmelden
        </button>
    </form>
</div>
{% endblock %}
