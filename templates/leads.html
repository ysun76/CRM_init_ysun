{% extends 'base.html' %}

{% block content %}
<h1>Leads-Verwaltung</h1>

{% if session.get('role') == 'admin' %}
    <a href="{{ url_for('add_lead') }}" class="btn btn-primary mb-3">+ Lead hinzufügen</a>
{% endif %}

<table class="table">
    <tbody>
        {% for l in leads %}
        <tr>
            <td>{{ l.name }}</td>
            <td>
                <a href="{{ url_for('lead_detail', lead_id=l.id) }}" class="btn btn-sm btn-info">View</a>

                {% if session.get('role') == 'admin' %}
                    <form action="{{ url_for('convert_lead', lead_id=l.id) }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-success">🎯 Konvertieren</button>
                    </form>
                    <form action="{{ url_for('delete_lead', lead_id=l.id) }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Löschen</button>
                    </form>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
