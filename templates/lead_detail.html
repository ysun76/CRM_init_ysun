{% extends 'base.html' %}

{% block content %}
<h1>{{ lead.name }}</h1>

<div class="card p-4 shadow-sm mb-4">
    <p><strong>E-Mail:</strong> {{ lead.email }}</p>
    <p><strong>Unternehmen:</strong> {{ lead.company }}</p>
    <p><strong>Erwarteter Wert:</strong> {{ lead.value }} €</p>
    <p><strong>Quelle:</strong> {{ lead.source }}</p>
</div>

<div class="mt-4">
    <a href="{{ url_for('leads') }}" class="btn btn-secondary">Zurück zur Liste</a>

    {% if session.get('role') == 'admin' %}
        <hr>
        <div class="admin-actions bg-light p-3 border rounded">
            <h6 class="text-muted mb-3">Administrator-Aktionen</h6>
            
            <form action="{{ url_for('convert_lead', lead_id=lead.id) }}" method="POST" style="display:inline;">
                <button type="submit" class="btn btn-success me-2">
                    🎯 In Kunde umwandeln
                </button>
            </form>

            <form action="{{ url_for('delete_lead', lead_id=lead.id) }}" method="POST" style="display:inline;">
                <button type="submit" class="btn btn-outline-danger" onclick="return confirm('Diesen Lead unwiderruflich löschen?')">
                    Löschen
                </button>
            </form>
        </div>
    {% endif %}
</div>
{% endblock %}
